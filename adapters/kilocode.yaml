# Adapter: Kilo Code (VSCode extension + CLI)
#
# Describes how to copy and adapt files from content/ for Kilo Code.
# Read by both installation channels (AI-agent installer and install.ps1).
#
# Schema: closed adapter schema described in AGENT-INSTALL.md (Lean placement)
# and implemented by install.ps1.
# Notes:
#   - Current Kilo Code (VSCode extension and CLI, built on the Kilo CLI core)
#     loads project content from the `.kilo/` directory:
#       rules    -> .kilo/rules/         (legacy `.kilocode/rules/` still works
#                                         via backward compatibility)
#       agents   -> .kilo/agents/        (markdown subagent files; the legacy
#                                         extension did not expose a folder for
#                                         these — `.kilocode/subagents/` was
#                                         never an official location)
#       commands -> .kilo/commands/      (formerly "workflows"; the new extension
#                                         auto-migrates `.kilocode/workflows/`
#                                         to `.kilo/commands/` on startup)
#       skills   -> .kilo/skills/        (per the Agent Skills specification;
#                                         `.kilocode/skills/` is not a recognised
#                                         skill directory)
#   - MCP project-level config still lives in `.kilocode/mcp.json` for the
#     VSCode extension (documented current location).
#   - Kilo Code distinguishes primary agents from subagents via a `mode` field:
#     `subagent` (only invoked via delegation) or `all` (both primary and
#     subagent). Source flag `isSubagent: true` maps to `mode: subagent`;
#     otherwise `mode: all`.
#   - Detection accepts both `.kilo/` (new) and `.kilocode/` (legacy) so
#     existing projects keep working without re-installing.

tool: kilocode
schemaVersion: 1

detection:
  - exists: ".kilo/"
  - exists: ".kilocode/"

rules:
  copyTo: ".kilo/rules-1c/{name}.md"
  frontmatter:
    keep: [description, alwaysApply]
    drop: [globs, category]

agents:
  copyTo: ".kilo/agents/{name}.md"
  frontmatter:
    keep: [name, description]
    drop: [tools, modelHint]
    addIf:
      isSubagent: { mode: subagent }
      "!isSubagent": { mode: all }
    drop: [allowParallel, reasoningEffort]

commands:
  copyTo: ".kilo/commands/{name}.md"
  frontmatter:
    keep: [description]
    drop: [argumentHint, allowedTools]

skills:
  copyTo: ".kilo/skills/{name}/"
  mode: verbatim

mcp:
  source: "content/mcp-servers.json"
  target: ".kilocode/mcp.json"
  schema: mcpServers
  format: json
